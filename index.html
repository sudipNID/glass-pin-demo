<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Samsung Wallet — Payments with Glass</title>
<style>
  :root {
    --cyan: #00e5ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Camera feed (bottom layer) --- */
  #camera {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    background: #000;
  }

  /* --- Transparent landmark canvas (above camera) --- */
  #overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;   /* MUST match #camera so coordinates align */
    z-index: 10;
    pointer-events: none; /* never blocks touches meant for HUD/buttons */
  }

  /* --- Debug controls --- */
  #debugBtn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 40;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid var(--cyan);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }
  #debugBtn.off {
    color: #888;
    border-color: #555;
    box-shadow: none;
  }

  /* --- Debug readout (top-right) --- */
  #status {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 40;
    min-width: 150px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(0, 229, 255, 0.4);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    text-align: right;
    white-space: pre;
    display: none; /* only visible when Debug ON */
  }

  /* --- Loading / error toast --- */
  #boot {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    z-index: 45;
    max-width: 90vw;
    padding: 10px 16px;
    font-size: 13px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    text-align: center;
    display: none;
  }

  /* =========================================================
     SPLASH SCREEN (top-most until Start Demo)
     ========================================================= */
  #splash{
    position:fixed;
    inset:0;
    z-index:200;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:26px;

    text-align:center;
    padding:0 24px;

    /* soft blue/purple radial glow on black */
    background:
      radial-gradient(circle at 50% 40%,
        rgba(125,120,255,.38) 0%,
        rgba(90,70,190,.16) 26%,
        rgba(0,0,0,0) 58%),
      #000;

    opacity:1;
    transition:opacity 500ms ease;
  }

  #glassesIcon{
    width:170px;
    height:auto;
    filter:drop-shadow(0 0 14px rgba(140,140,255,.55));
    animation:iconIn 900ms ease both, iconPulse 3.2s ease-in-out 900ms infinite;
  }
  #glassesIcon path,
  #glassesIcon rect{
    stroke-dasharray:340;
    stroke-dashoffset:340;
    animation:draw 1500ms ease forwards 150ms;
  }

  @keyframes draw       { to { stroke-dashoffset:0; } }
  @keyframes iconIn     { from { opacity:0; transform:translateY(10px) scale(.96); }
                          to   { opacity:1; transform:translateY(0)   scale(1);   } }
  @keyframes iconPulse  { 0%,100% { filter:drop-shadow(0 0 12px rgba(140,140,255,.45)); }
                          50%     { filter:drop-shadow(0 0 22px rgba(160,150,255,.8));  } }

  #splash .title{
    color:#fff;
    font-size:34px;
    font-weight:600;
    letter-spacing:.5px;
    animation:fadeUp 700ms ease both 400ms;
  }
  #splash .subtitle{
    color:#c9d3ff;
    font-size:17px;
    font-weight:500;
    letter-spacing:.3px;
    margin-top:-14px;
    animation:fadeUp 700ms ease both 560ms;
  }
  #splash .caption{
    color:#7f86a8;
    font-size:12px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    animation:fadeUp 700ms ease both 700ms;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); }
                      to   { opacity:1; transform:translateY(0);   } }

  #startBtn{
    margin-top:14px;
    padding:16px 48px;
    font-size:16px;
    font-weight:600;
    letter-spacing:.6px;
    color:#fff;
    border:none;
    border-radius:40px;
    background:linear-gradient(180deg,#6db8ff,#8f6dff);
    box-shadow:0 10px 34px rgba(120,120,255,.5);
    animation:fadeUp 700ms ease both 860ms;
    transition:transform 120ms ease, box-shadow 120ms ease;
  }
  #startBtn:active{
    transform:scale(.96);
    box-shadow:0 6px 22px rgba(120,120,255,.45);
  }

  /* =========================================================
     HUD — TOP LAYER (above camera + overlay).
     Hidden until the demo is revealed.
     ========================================================= */
  #hud{
    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:35px;

    z-index:100;

    pointer-events:none;

    opacity:0;
    transition:opacity 500ms ease;
}
#hud.revealed{ opacity:1; }

#pinDots{
    display:flex;
    gap:18px;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #8aa9ff;
}

#rail{
    position:relative;

    width:min(92vw,900px);
    height:90px;

    /* increased inner padding so 0 and 9 aren't cramped */
    padding:0 26px;

    border-radius:45px;

    border:2px solid rgba(130,170,255,.7);

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    box-shadow:
        0 0 20px rgba(90,160,255,.35);
}

.number{
    color:white;
    font-size:38px;
    z-index:2;

    transition:transform .12s ease, color .12s ease, text-shadow .12s ease;
}

/* Nearest digit under the selector */
.number.active{
    color:#fff;
    transform:scale(1.35);
    text-shadow:
        0 0 14px #6da8ff,
        0 0 26px #a66cff;
}

#selector{
    position:absolute;
    left:0;
    top:50%;

    /* slimmer pill: ~40% narrower, frames a single digit */
    width:44px;
    height:60px;
    margin-top:-30px;      /* vertically centre (half of height) */

    border-radius:18px;    /* slightly reduced from 24px */

    background:linear-gradient(180deg,#6db8ff,#b06dff);

    /* slightly reduced glow, still premium */
    box-shadow:
        0 0 14px rgba(109,184,255,.55),
        0 0 26px rgba(176,109,255,.35);

    z-index:1;

    /* GPU-accelerated magnetic snap */
    transform:translate3d(0,0,0);
    transition:transform 120ms cubic-bezier(0.34,1.2,0.64,1);
    will-change:transform;
}
</style>
</head>
<body>

  <!-- Camera feed -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- Transparent landmark overlay -->
  <canvas id="overlay"></canvas>

  <!-- Debug controls -->
  <button id="debugBtn" class="off">DEBUG: OFF</button>
  <div id="status"></div>

  <!-- Boot / error message -->
  <div id="boot">Starting camera…</div>

  <!-- ===== SPLASH SCREEN ===== -->
  <div id="splash">
    <svg id="glassesIcon" viewBox="0 0 200 84" fill="none"
         stroke="#a9baff" stroke-width="3"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="16" y="28" width="62" height="34" rx="13"></rect>
      <rect x="122" y="28" width="62" height="34" rx="13"></rect>
      <path d="M78 40 Q100 30 122 40"></path>
      <path d="M16 36 Q6 32 3 40"></path>
      <path d="M184 36 Q194 32 197 40"></path>
    </svg>

    <div class="title">Samsung Wallet</div>
    <div class="subtitle">Payments with Glass</div>
    <div class="caption">Authentication Interaction Prototype</div>

    <button id="startBtn">Start Demo</button>
  </div>

  <!-- ===== HUD (kept on top, revealed after start) ===== -->
 <div id="hud">

    <div id="pinDots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="rail">

        <div id="selector"></div>

        <div class="number">0</div>
        <div class="number">1</div>
        <div class="number">2</div>
        <div class="number">3</div>
        <div class="number">4</div>
        <div class="number">5</div>
        <div class="number">6</div>
        <div class="number">7</div>
        <div class="number">8</div>
        <div class="number">9</div>

    </div>

</div>

<script type="module">
  import {
    FilesetResolver,
    HandLandmarker
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs";

  // ---------- DOM ----------
  const video   = document.getElementById("camera");
  const canvas  = document.getElementById("overlay");
  const ctx     = canvas.getContext("2d");
  const debugBtn = document.getElementById("debugBtn");
  const statusEl = document.getElementById("status");
  const bootEl  = document.getElementById("boot");

  // Splash + HUD
  const splashEl = document.getElementById("splash");
  const startBtn = document.getElementById("startBtn");
  const hudEl    = document.getElementById("hud");

  // Selector DOM
  const railEl     = document.getElementById("rail");
  const selectorEl = document.getElementById("selector");
  const numberEls  = Array.from(railEl.querySelectorAll(".number"));

  // ---------- State ----------
  let handLandmarker = null;
  let debugOn = false;
  let lastVideoTime = -1;
  let latestResult = null;

  // FPS tracking (no per-frame allocations)
  let fps = 0;
  let frameCount = 0;
  let fpsTimer = performance.now();

  // Hand connections (official constant from the Tasks Vision API)
  const CONNECTIONS = HandLandmarker.HAND_CONNECTIONS;

  // ---------- Selector state ----------
  const WRIST = 0;             // landmark 0 = wrist (drives position)
  let selectorW = 44;
  let currentIndex = -1;       // digit the selector is snapped to
  const geom = { displayedW: 0, offsetX: 0 };
  const numberCenters = [];    // digit centres within the rail (px)

  function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }

  // Recompute layout-dependent geometry (start + resize)
  function computeGeometry() {
    if (!video.videoWidth) return;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // object-fit: cover -> scale by larger ratio, then centre
    const scale = Math.max(vw / video.videoWidth, vh / video.videoHeight);
    geom.displayedW = video.videoWidth * scale;
    geom.offsetX = (vw - geom.displayedW) / 2;

    selectorW = selectorEl.offsetWidth;

    numberCenters.length = 0;
    for (const n of numberEls) {
      numberCenters.push(n.offsetLeft + n.offsetWidth / 2);
    }
  }

  // Which digit is the wrist nearest to?
  function nearestIndexFromWrist(wrist) {
    const railBox = railEl.getBoundingClientRect();
    const screenX = geom.offsetX + wrist.x * geom.displayedW;
    const centerInRail = screenX - (railBox.left + railEl.clientLeft);

    let best = 0, bestDist = Infinity;
    for (let i = 0; i < numberCenters.length; i++) {
      const d = Math.abs(numberCenters[i] - centerInRail);
      if (d < bestDist) { bestDist = d; best = i; }
    }
    return best;
  }

  // Snap the selector to a digit (magnetic 120ms CSS transition, GPU)
  function moveToIndex(idx) {
    if (idx === currentIndex) return; // don't restart the animation each frame
    const prev = currentIndex;
    currentIndex = idx;

    const x = clamp(
      numberCenters[idx] - selectorW / 2,
      0,
      railEl.clientWidth - selectorW
    );
    selectorEl.style.transform = "translate3d(" + x + "px,0,0)";

    if (prev >= 0) numberEls[prev].classList.remove("active");
    numberEls[idx].classList.add("active");
  }

  // Reposition without changing the active digit (after resize)
  function repositionSelector() {
    if (currentIndex < 0) return;
    const x = clamp(
      numberCenters[currentIndex] - selectorW / 2,
      0,
      railEl.clientWidth - selectorW
    );
    selectorEl.style.transform = "translate3d(" + x + "px,0,0)";
  }

  // ---------- Debug toggle ----------
  debugBtn.addEventListener("click", () => {
    debugOn = !debugOn;
    debugBtn.textContent = debugOn ? "DEBUG: ON" : "DEBUG: OFF";
    debugBtn.classList.toggle("off", !debugOn);
    statusEl.style.display = debugOn ? "block" : "none";
    if (!debugOn) ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // ---------- Camera (rear) ----------
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" }, // rear camera
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    video.srcObject = stream;
    await new Promise((resolve) => {
      video.onloadedmetadata = () => { video.play(); resolve(); };
    });
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  // ---------- MediaPipe init (current official API) ----------
  async function initHandLandmarker() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
  }

  // ---------- Render loop ----------
  function loop() {
    if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      latestResult = handLandmarker.detectForVideo(video, performance.now());
    }

    // FPS
    frameCount++;
    const now = performance.now();
    if (now - fpsTimer >= 1000) {
      fps = frameCount;
      frameCount = 0;
      fpsTimer = now;
    }

    // --- Selector: magnetic snap to nearest digit ---
    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    if (hands && hands.length > 0) {
      moveToIndex(nearestIndexFromWrist(hands[0][WRIST]));
    }
    // If no hand: hold last snapped digit.

    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Draw (debug overlay only) ----------
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    const handPresent = hands && hands.length > 0;

    if (!debugOn || !handPresent) {
      if (debugOn) updateStatus(false);
      return;
    }

    const w = canvas.width;
    const h = canvas.height;
    const lm = hands[0];

    // Thin cyan glowing connection lines
    ctx.save();
    ctx.strokeStyle = "#00e5ff";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i = 0; i < CONNECTIONS.length; i++) {
      const a = lm[CONNECTIONS[i].start];
      const b = lm[CONNECTIONS[i].end];
      ctx.moveTo(a.x * w, a.y * h);
      ctx.lineTo(b.x * w, b.y * h);
    }
    ctx.stroke();
    ctx.restore();

    // Cyan glowing landmarks (21)
    ctx.save();
    ctx.fillStyle = "#00e5ff";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 12;
    for (let i = 0; i < lm.length; i++) {
      ctx.beginPath();
      ctx.arc(lm[i].x * w, lm[i].y * h, 5, 0, 6.283185307179586);
      ctx.fill();
    }
    ctx.restore();

    // Landmark IDs (0–20)
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 14px monospace";
    ctx.textBaseline = "middle";
    for (let i = 0; i < lm.length; i++) {
      ctx.fillText(String(i), lm[i].x * w + 8, lm[i].y * h);
    }
    ctx.restore();

    updateStatus(true);
  }

  // ---------- Debug readout ----------
  function updateStatus(detected) {
    statusEl.textContent =
      "STATUS: " + (detected ? "HAND DETECTED" : "NO HAND") + "\n" +
      "FPS: " + fps + "\n" +
      "HANDS: " + (detected ? 1 : 0) + "\n" +
      "SELECTED: " + (currentIndex >= 0 ? currentIndex : "-");
  }

  // ---------- Resize ----------
  window.addEventListener("resize", () => { computeGeometry(); repositionSelector(); });
  window.addEventListener("orientationchange", () =>
    setTimeout(() => { computeGeometry(); repositionSelector(); }, 300));

  // ---------- Start Demo (splash -> camera -> MediaPipe -> reveal HUD) ----------
  startBtn.addEventListener("click", () => {
    // 1) Fade the splash out over 500ms
    splashEl.style.opacity = "0";

    setTimeout(async () => {
      splashEl.style.display = "none";
      bootEl.style.display = "block";
      try {
        // 2) Initialize the camera
        bootEl.textContent = "Starting camera…";
        await startCamera();

        // 3) Start MediaPipe
        bootEl.textContent = "Loading MediaPipe…";
        await initHandLandmarker();

        // Selector geometry + initial position
        computeGeometry();
        moveToIndex(0);

        // 4) Reveal the existing PIN HUD
        hudEl.classList.add("revealed");

        bootEl.style.display = "none";
        requestAnimationFrame(loop);
      } catch (err) {
        bootEl.textContent = "Error: " + (err && err.message ? err.message : err);
        console.error(err);
      }
    }, 500);
  });
</script>
</body>
</html>
