<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hand Landmarker — Step 3B (Selector Movement)</title>
<style>
  :root {
    --cyan: #00e5ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Camera feed (bottom layer) --- */
  #camera {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    background: #000;
  }

  /* --- Transparent landmark canvas (above camera) --- */
  #overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;   /* MUST match #camera so coordinates align */
    z-index: 10;
    pointer-events: none; /* never blocks touches meant for HUD/buttons */
  }

  /* --- Debug controls --- */
  #debugBtn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 40;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid var(--cyan);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }
  #debugBtn.off {
    color: #888;
    border-color: #555;
    box-shadow: none;
  }

  /* --- Debug readout (top-right) --- */
  #status {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 40;
    min-width: 150px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(0, 229, 255, 0.4);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    text-align: right;
    white-space: pre;
    display: none; /* only visible when Debug ON */
  }

  /* --- Loading / error toast --- */
  #boot {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    z-index: 45;
    max-width: 90vw;
    padding: 10px 16px;
    font-size: 13px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    text-align: center;
  }

  /* =========================================================
     HUD — TOP LAYER (above everything).
     ========================================================= */
  #hud{
    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:35px;

    z-index:100;

    pointer-events:none;
}

#pinDots{
    display:flex;
    gap:18px;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #8aa9ff;
}

#rail{
    position:relative;

    width:min(92vw,900px);
    height:90px;

    border-radius:45px;

    border:2px solid rgba(130,170,255,.7);

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    box-shadow:
        0 0 20px rgba(90,160,255,.35);
}

.number{
    color:white;
    font-size:38px;
    z-index:2;

    transition:transform .12s ease, color .12s ease, text-shadow .12s ease;
}

/* Nearest digit under the selector */
.number.active{
    color:#fff;
    transform:scale(1.35);
    text-shadow:
        0 0 14px #6da8ff,
        0 0 26px #a66cff;
}

#selector{
    position:absolute;

    left:8px;

    width:74px;
    height:74px;

    border-radius:24px;

    background:linear-gradient(180deg,#6db8ff,#b06dff);

    box-shadow:
        0 0 25px #6da8ff,
        0 0 45px #a66cff;

    z-index:1;

    will-change:left;
}
</style>
</head>
<body>

  <!-- Camera feed -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- Transparent landmark overlay -->
  <canvas id="overlay"></canvas>

  <!-- Debug controls -->
  <button id="debugBtn" class="off">DEBUG: OFF</button>
  <div id="status"></div>

  <!-- Boot / error message -->
  <div id="boot">Starting camera…</div>

  <!-- ===== HUD (kept on top) ===== -->
 <div id="hud">

    <div id="pinDots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="rail">

        <div id="selector"></div>

        <div class="number">0</div>
        <div class="number">1</div>
        <div class="number">2</div>
        <div class="number">3</div>
        <div class="number">4</div>
        <div class="number">5</div>
        <div class="number">6</div>
        <div class="number">7</div>
        <div class="number">8</div>
        <div class="number">9</div>

    </div>

</div>

<script type="module">
  import {
    FilesetResolver,
    HandLandmarker
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs";

  // ---------- DOM ----------
  const video   = document.getElementById("camera");
  const canvas  = document.getElementById("overlay");
  const ctx     = canvas.getContext("2d");
  const debugBtn = document.getElementById("debugBtn");
  const statusEl = document.getElementById("status");
  const bootEl  = document.getElementById("boot");

  // HUD / selector DOM
  const railEl     = document.getElementById("rail");
  const selectorEl = document.getElementById("selector");
  const numberEls  = Array.from(railEl.querySelectorAll(".number"));

  // ---------- State ----------
  let handLandmarker = null;
  let debugOn = false;
  let lastVideoTime = -1;
  let latestResult = null;

  // FPS tracking (no per-frame allocations)
  let fps = 0;
  let frameCount = 0;
  let fpsTimer = performance.now();

  // Hand connections (official constant from the Tasks Vision API)
  const CONNECTIONS = HandLandmarker.HAND_CONNECTIONS;

  // ---------- Selector movement state ----------
  const SMOOTH = 0.22;          // glide easing (0 = frozen, 1 = instant snap)
  const WRIST = 0;              // landmark index 0 = wrist (drives position)

  let curLeft = 8;             // current selector left (px, within rail)
  let targetLeft = 8;         // target selector left (px)
  let minLeft = 8;
  let maxLeft = 8;
  let selectorW = 74;
  let lastActive = -1;         // currently highlighted digit index

  // Cover-fit transform of the camera frame onto the viewport
  const geom = { displayedW: 0, offsetX: 0 };
  const numberCenters = [];    // digit centers within the rail (px)

  // Recompute all layout-dependent geometry (call on start + resize)
  function computeGeometry() {
    if (!video.videoWidth) return;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // object-fit: cover -> scale by the larger ratio, then center
    const scale = Math.max(vw / video.videoWidth, vh / video.videoHeight);
    geom.displayedW = video.videoWidth * scale;
    geom.offsetX = (vw - geom.displayedW) / 2;

    selectorW = selectorEl.offsetWidth;
    minLeft = 8;
    maxLeft = railEl.clientWidth - selectorW - 8;

    numberCenters.length = 0;
    for (const n of numberEls) {
      numberCenters.push(n.offsetLeft + n.offsetWidth / 2);
    }
  }

  // Map the wrist's on-screen horizontal position to a selector target
  function updateSelectorTarget(wrist) {
    const railBox = railEl.getBoundingClientRect();

    // wrist.x is normalized to the camera frame -> convert to screen px
    const screenX = geom.offsetX + wrist.x * geom.displayedW;

    // convert screen px -> selector "left" inside the rail's padding box
    let left = screenX - (railBox.left + railEl.clientLeft) - selectorW / 2;

    if (left < minLeft) left = minLeft;
    if (left > maxLeft) left = maxLeft;
    targetLeft = left;
  }

  // Smoothly glide the selector and highlight the nearest digit (every frame)
  function animateSelector() {
    curLeft += (targetLeft - curLeft) * SMOOTH;
    selectorEl.style.left = curLeft + "px";

    const center = curLeft + selectorW / 2;
    let best = 0;
    let bestDist = Infinity;
    for (let i = 0; i < numberCenters.length; i++) {
      const d = Math.abs(numberCenters[i] - center);
      if (d < bestDist) { bestDist = d; best = i; }
    }

    // Only touch the DOM when the active digit actually changes
    if (best !== lastActive) {
      if (lastActive >= 0) numberEls[lastActive].classList.remove("active");
      numberEls[best].classList.add("active");
      lastActive = best;
    }
  }

  // ---------- Debug toggle ----------
  debugBtn.addEventListener("click", () => {
    debugOn = !debugOn;
    debugBtn.textContent = debugOn ? "DEBUG: ON" : "DEBUG: OFF";
    debugBtn.classList.toggle("off", !debugOn);
    statusEl.style.display = debugOn ? "block" : "none";
    if (!debugOn) ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // ---------- Camera (rear) ----------
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" }, // rear camera
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    video.srcObject = stream;
    await new Promise((resolve) => {
      video.onloadedmetadata = () => { video.play(); resolve(); };
    });
    // Match canvas internal resolution to the camera's intrinsic size.
    // Both <video> and <canvas> use object-fit: cover, so normalized
    // landmark coords map 1:1 without extra math.
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  // ---------- MediaPipe init (current official API) ----------
  async function initHandLandmarker() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
  }

  // ---------- Render loop ----------
  function loop() {
    // Run detection only when a new frame is ready.
    if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      latestResult = handLandmarker.detectForVideo(video, performance.now());
    }

    // FPS (updated ~once per second)
    frameCount++;
    const now = performance.now();
    if (now - fpsTimer >= 1000) {
      fps = frameCount;
      frameCount = 0;
      fpsTimer = now;
    }

    // --- Selector movement (runs regardless of Debug) ---
    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    if (hands && hands.length > 0) {
      updateSelectorTarget(hands[0][WRIST]); // wrist drives the target
    }
    // If no hand: target is held, selector eases to rest at last position.
    animateSelector();

    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Draw (debug overlay only) ----------
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    const handPresent = hands && hands.length > 0;

    // Debug OFF -> draw nothing. No hand -> draw nothing.
    if (!debugOn || !handPresent) {
      if (debugOn) updateStatus(false);
      return;
    }

    const w = canvas.width;
    const h = canvas.height;
    const lm = hands[0]; // single hand

    // --- Thin cyan glowing connection lines ---
    ctx.save();
    ctx.strokeStyle = "#00e5ff";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i = 0; i < CONNECTIONS.length; i++) {
      const a = lm[CONNECTIONS[i].start];
      const b = lm[CONNECTIONS[i].end];
      ctx.moveTo(a.x * w, a.y * h);
      ctx.lineTo(b.x * w, b.y * h);
    }
    ctx.stroke();
    ctx.restore();

    // --- Cyan glowing landmarks (21) ---
    ctx.save();
    ctx.fillStyle = "#00e5ff";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 12;
    for (let i = 0; i < lm.length; i++) {
      ctx.beginPath();
      ctx.arc(lm[i].x * w, lm[i].y * h, 5, 0, 6.283185307179586);
      ctx.fill();
    }
    ctx.restore();

    // --- Landmark IDs (0–20) ---
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 14px monospace";
    ctx.textBaseline = "middle";
    for (let i = 0; i < lm.length; i++) {
      ctx.fillText(String(i), lm[i].x * w + 8, lm[i].y * h);
    }
    ctx.restore();

    updateStatus(true);
  }

  // ---------- Debug readout ----------
  function updateStatus(detected) {
    statusEl.textContent =
      "STATUS: " + (detected ? "HAND DETECTED" : "NO HAND") + "\n" +
      "FPS: " + fps + "\n" +
      "HANDS: " + (detected ? 1 : 0) + "\n" +
      "SELECTED: " + (lastActive >= 0 ? lastActive : "-");
  }

  // ---------- Resize ----------
  window.addEventListener("resize", computeGeometry);
  window.addEventListener("orientationchange", () => setTimeout(computeGeometry, 300));

  // ---------- Boot ----------
  (async function boot() {
    try {
      bootEl.textContent = "Starting camera…";
      await startCamera();

      bootEl.textContent = "Loading MediaPipe…";
      await initHandLandmarker();

      // Selector geometry now that the camera size is known
      computeGeometry();
      curLeft = targetLeft = minLeft;
      selectorEl.style.left = curLeft + "px";

      bootEl.style.display = "none";
      requestAnimationFrame(loop);
    } catch (err) {
      bootEl.textContent = "Error: " + (err && err.message ? err.message : err);
      console.error(err);
    }
  })();
</script>
</body>
</html>
