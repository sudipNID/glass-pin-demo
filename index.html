<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Hand Landmarker — Step 3A</title>
<style>
  :root {
    --cyan: #00e5ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Camera feed (bottom layer) --- */
  #camera {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    background: #000;
  }

  /* --- Transparent landmark canvas (above camera) --- */
  #overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;   /* MUST match #camera so coordinates align */
    z-index: 10;
    pointer-events: none; /* never blocks touches meant for HUD/buttons */
  }

  /* --- Debug controls --- */
  #debugBtn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 40;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid var(--cyan);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }
  #debugBtn.off {
    color: #888;
    border-color: #555;
    box-shadow: none;
  }

  /* --- Debug readout (top-right) --- */
  #status {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 40;
    min-width: 150px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(0, 229, 255, 0.4);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    text-align: right;
    white-space: pre;
    display: none; /* only visible when Debug ON */
  }

  /* --- Loading / error toast --- */
  #boot {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    z-index: 45;
    max-width: 90vw;
    padding: 10px 16px;
    font-size: 13px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    text-align: center;
  }

  /* =========================================================
     HUD — TOP LAYER (above everything).
     Replace the contents of #hud below with your existing
     PIN-authentication HUD markup. Keep z-index: 100.
     ========================================================= */
  #hud {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none; /* container ignores touches... */
  }
  #hud .hud-panel {
    pointer-events: auto; /* ...but interactive children accept them */
  }
</style>
</head>
<body>

  <!-- Camera feed -->
  <video id="camera" autoplay playsinline muted></video>

  <!-- Transparent landmark overlay -->
  <canvas id="overlay"></canvas>

  <!-- Debug controls -->
  <button id="debugBtn" class="off">DEBUG: OFF</button>
  <div id="status"></div>

  <!-- Boot / error message -->
  <div id="boot">Starting camera…</div>

  <!-- ===== YOUR EXISTING HUD GOES HERE (kept on top) ===== -->
  <div id="hud">
    <!-- Paste your PIN-authentication HUD here. Placeholder below: -->
    <!-- <div class="hud-panel"> ... your PIN pad ... </div> -->
  </div>

<script type="module">
  import {
    FilesetResolver,
    HandLandmarker
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs";

  // ---------- DOM ----------
  const video   = document.getElementById("camera");
  const canvas  = document.getElementById("overlay");
  const ctx     = canvas.getContext("2d");
  const debugBtn = document.getElementById("debugBtn");
  const statusEl = document.getElementById("status");
  const bootEl  = document.getElementById("boot");

  // ---------- State ----------
  let handLandmarker = null;
  let debugOn = false;
  let lastVideoTime = -1;
  let latestResult = null;

  // FPS tracking (no per-frame allocations)
  let fps = 0;
  let frameCount = 0;
  let fpsTimer = performance.now();

  // Hand connections (official constant from the Tasks Vision API)
  const CONNECTIONS = HandLandmarker.HAND_CONNECTIONS;

  // ---------- Debug toggle ----------
  debugBtn.addEventListener("click", () => {
    debugOn = !debugOn;
    debugBtn.textContent = debugOn ? "DEBUG: ON" : "DEBUG: OFF";
    debugBtn.classList.toggle("off", !debugOn);
    statusEl.style.display = debugOn ? "block" : "none";
    if (!debugOn) ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // ---------- Camera (rear) ----------
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" }, // rear camera
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    video.srcObject = stream;
    await new Promise((resolve) => {
      video.onloadedmetadata = () => { video.play(); resolve(); };
    });
    // Match canvas internal resolution to the camera's intrinsic size.
    // Both <video> and <canvas> use object-fit: cover, so normalized
    // landmark coords map 1:1 without extra math.
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  // ---------- MediaPipe init (current official API) ----------
  async function initHandLandmarker() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
  }

  // ---------- Render loop ----------
  function loop() {
    // Run detection only when a new frame is ready.
    if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      latestResult = handLandmarker.detectForVideo(video, performance.now());
    }

    // FPS (updated ~once per second)
    frameCount++;
    const now = performance.now();
    if (now - fpsTimer >= 1000) {
      fps = frameCount;
      frameCount = 0;
      fpsTimer = now;
    }

    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Draw ----------
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    const handPresent = hands && hands.length > 0;

    // Debug OFF -> draw nothing. No hand -> draw nothing.
    if (!debugOn || !handPresent) {
      if (debugOn) updateStatus(false);
      return;
    }

    const w = canvas.width;
    const h = canvas.height;
    const lm = hands[0]; // single hand

    // --- Thin cyan glowing connection lines ---
    ctx.save();
    ctx.strokeStyle = "#00e5ff";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i = 0; i < CONNECTIONS.length; i++) {
      const a = lm[CONNECTIONS[i].start];
      const b = lm[CONNECTIONS[i].end];
      ctx.moveTo(a.x * w, a.y * h);
      ctx.lineTo(b.x * w, b.y * h);
    }
    ctx.stroke();
    ctx.restore();

    // --- Cyan glowing landmarks (21) ---
    ctx.save();
    ctx.fillStyle = "#00e5ff";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 12;
    for (let i = 0; i < lm.length; i++) {
      ctx.beginPath();
      ctx.arc(lm[i].x * w, lm[i].y * h, 5, 0, 6.283185307179586);
      ctx.fill();
    }
    ctx.restore();

    // --- Landmark IDs (0–20) ---
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 14px monospace";
    ctx.textBaseline = "middle";
    for (let i = 0; i < lm.length; i++) {
      ctx.fillText(String(i), lm[i].x * w + 8, lm[i].y * h);
    }
    ctx.restore();

    updateStatus(true);
  }

  // ---------- Debug readout ----------
  function updateStatus(detected) {
    statusEl.textContent =
      "STATUS: " + (detected ? "HAND DETECTED" : "NO HAND") + "\n" +
      "FPS: " + fps + "\n" +
      "HANDS: " + (detected ? 1 : 0);
  }

  // ---------- Boot ----------
  (async function boot() {
    try {
      bootEl.textContent = "Starting camera…";
      await startCamera();

      bootEl.textContent = "Loading MediaPipe…";
      await initHandLandmarker();

      bootEl.style.display = "none";
      requestAnimationFrame(loop);
    } catch (err) {
      bootEl.textContent = "Error: " + (err && err.message ? err.message : err);
      console.error(err);
    }
  })();
</script>
</body>
</html>
