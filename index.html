<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass PIN Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#000;
    overflow:hidden;
    height:100vh;
}

/* Rear Camera */
#camera{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

/* Dark overlay to simulate glasses */
#overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    z-index:1;
}

/* HUD */
#hud{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:35px;
    z-index:2;
}

#pinDots{
    display:flex;
    gap:18px;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #8aa9ff;
}

#rail{
    position:relative;
    width:min(92vw,900px);
    height:90px;
    border-radius:45px;
    border:2px solid rgba(130,170,255,.7);
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);

    display:flex;
    justify-content:space-evenly;
    align-items:center;

    box-shadow:
        0 0 20px rgba(90,160,255,.35);
}

.number{
    color:white;
    font-size:38px;
    z-index:2;
}

#selector{
    position:absolute;
    left:8px;
    width:74px;
    height:74px;
    border-radius:24px;

    background:linear-gradient(180deg,#6db8ff,#b06dff);

    box-shadow:
        0 0 25px #6da8ff,
        0 0 45px #a66cff;

    z-index:1;
}
</style>

</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div id="overlay"></div>

<div id="hud">

    <div id="pinDots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="rail">

        <div id="selector"></div>

        <div class="number">0</div>
        <div class="number">1</div>
        <div class="number">2</div>
        <div class="number">3</div>
        <div class="number">4</div>
        <div class="number">5</div>
        <div class="number">6</div>
        <div class="number">7</div>
        <div class="number">8</div>
        <div class="number">9</div>

    </div>

</div>

<script>

const video=document.getElementById("camera");

async function startCamera(){

    try{

        const stream=await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:{
                    ideal:"environment"
                }
            },

            audio:false

        });

        video.srcObject=stream;

    }

    catch(err){

        alert("Camera permission denied.\n\n"+err.message);

        console.error(err);

    }

}

startCamera();

</script>

</body>
</html>
