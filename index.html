<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MediaPipe Hand Landmarker Demo</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif}
video,canvas{position:fixed;inset:0;width:100%;height:100%;object-fit:cover}
#overlay{pointer-events:none}
#hud{
position:fixed;top:12px;left:12px;z-index:10;
background:rgba(0,0,0,.55);color:#fff;padding:10px 12px;
border-radius:8px;font-size:14px
}
button{margin-top:8px}
</style>
</head>
<body>
<video id="camera" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<!-- Preserve/extend your HUD here -->
<div id="hud">
<div><strong>Hand Landmarker Demo</strong></div>
<div id="status">Loading…</div>
<button id="debugBtn">Debug: OFF</button>
</div>

<script type="module">
import {
  FilesetResolver,
  HandLandmarker
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/+esm";


const video=document.getElementById("camera");
const canvas=document.getElementById("overlay");
const ctx=canvas.getContext("2d");
const statusEl=document.getElementById("status");
const debugBtn=document.getElementById("debugBtn");

let debug=false;
debugBtn.onclick=()=>{
  debug=!debug;
  debugBtn.textContent=`Debug: ${debug?"ON":"OFF"}`;
};

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
addEventListener("resize",resize);
resize();

async function init(){
  const stream=await navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"}},
    audio:false
  });
  video.srcObject=stream;
  await video.play();

  const vision=await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.22/wasm"
  );

  const handLandmarker=await HandLandmarker.createFromOptions(vision,{
    baseOptions:{
      modelAssetPath:"https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
    },
    runningMode:"VIDEO",
    numHands:2
  });

  statusEl.textContent="Running";

  function render(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const res=handLandmarker.detectForVideo(video,performance.now());

    if(res.landmarks){
      for(const hand of res.landmarks){
        for(const p of hand){
          const x=p.x*canvas.width;
          const y=p.y*canvas.height;
          ctx.beginPath();
          ctx.arc(x,y,5,0,Math.PI*2);
          ctx.fillStyle="#00ffff";
          ctx.shadowColor="#00ffff";
          ctx.shadowBlur=15;
          ctx.fill();
        }

        const edges=[
          [0,1],[1,2],[2,3],[3,4],
          [0,5],[5,6],[6,7],[7,8],
          [5,9],[9,10],[10,11],[11,12],
          [9,13],[13,14],[14,15],[15,16],
          [13,17],[17,18],[18,19],[19,20],
          [0,17]
        ];
        ctx.strokeStyle="#00ffff";
        ctx.lineWidth=3;
        ctx.shadowColor="#00ffff";
        ctx.shadowBlur=12;
        for(const [a,b] of edges){
          ctx.beginPath();
          ctx.moveTo(hand[a].x*canvas.width,hand[a].y*canvas.height);
          ctx.lineTo(hand[b].x*canvas.width,hand[b].y*canvas.height);
          ctx.stroke();
        }

        if(debug){
          ctx.shadowBlur=0;
          ctx.fillStyle="#fff";
          hand.forEach((p,i)=>{
            ctx.fillText(String(i),p.x*canvas.width+6,p.y*canvas.height-6);
          });
        }
      }
    }

    requestAnimationFrame(render);
  }
  render();
}

init().catch(e=>{
  console.error(e);
  statusEl.textContent="Error: "+e.message;
});
</script>
</body>
</html>
