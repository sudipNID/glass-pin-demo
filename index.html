<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Samsung Wallet — Payments with Glass</title>
<style>
  :root {
    --cyan: #00e5ff;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #000;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  /* --- Camera feed (bottom layer) --- */
  #camera {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    background: #000;
  }

  /* --- Transparent landmark canvas (above camera) --- */
  #overlay {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;   /* MUST match #camera so coordinates align */
    z-index: 10;
    pointer-events: none; /* never blocks touches meant for HUD/buttons */
  }

  /* --- Debug controls --- */
  #debugBtn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 40;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid var(--cyan);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }
  #debugBtn.off {
    color: #888;
    border-color: #555;
    box-shadow: none;
  }

  /* --- Debug readout (top-right) --- */
  #status {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 40;
    min-width: 150px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    color: var(--cyan);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(0, 229, 255, 0.4);
    border-radius: 10px;
    backdrop-filter: blur(4px);
    text-align: right;
    white-space: pre;
    display: none; /* only visible when Debug ON */
  }

  /* --- Loading / error toast --- */
  #boot {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    z-index: 45;
    max-width: 90vw;
    padding: 10px 16px;
    font-size: 13px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    text-align: center;
    display: none;
  }

  /* =========================================================
     SPLASH SCREEN (top-most until Start Demo)
     ========================================================= */
  #splash{
    position:fixed;
    inset:0;
    z-index:200;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    padding:0 26px;
    overflow:hidden;

    background:
      radial-gradient(120% 92% at 50% 30%,
        rgba(150,120,255,.30) 0%,
        rgba(90,70,190,.13) 34%,
        rgba(0,0,0,0) 62%),
      radial-gradient(80% 60% at 24% 84%,
        rgba(45,180,205,.14) 0%,
        rgba(0,0,0,0) 60%),
      #05060a;

    opacity:1;
    transition:opacity 500ms ease;
  }

  #splash::before{
    content:"";
    position:absolute;
    inset:-25%;
    background:radial-gradient(closest-side, rgba(140,110,255,.16), transparent 70%);
    filter:blur(24px);
    pointer-events:none;
    animation:aura 10s ease-in-out infinite;
  }
  @keyframes aura{
    0%,100% { transform:translate(-6%,-4%) scale(1);    opacity:.7; }
    50%     { transform:translate(6%, 4%)  scale(1.12); opacity:1;  }
  }

  .splash-stage{
    position:relative;
    z-index:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:26px;
  }

  /* --- glasses (reference photo) --- */
  .glasses-wrap{
    filter:drop-shadow(0 14px 36px rgba(120,120,255,.30));
    animation:floatY 5.2s ease-in-out infinite, fadeUp 900ms ease both;
  }
  .glasses-img{
    width:min(78vw,300px);
    height:auto;
    display:block;
    -webkit-mask-image:radial-gradient(ellipse 72% 74% at 50% 50%, #000 52%, transparent 86%);
            mask-image:radial-gradient(ellipse 72% 74% at 50% 50%, #000 52%, transparent 86%);
  }
  @keyframes floatY { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-7px); } }

  /* --- brand lockup (real assets) --- */
  .brand{
    display:flex;
    align-items:center;
    gap:16px;
    animation:fadeUp 800ms ease both 500ms;
  }
  .wallet-icon{ height:60px; width:auto; display:block; filter:drop-shadow(0 6px 16px rgba(90,90,230,.45)); }
  .wallet-word{ height:56px; width:auto; display:block; }

  .subtitle{
    color:#c7cdf2; font-size:17px; font-weight:500; letter-spacing:.3px;
    animation:fadeUp 800ms ease both 640ms;
  }

  @keyframes fadeUp { from { opacity:0; transform:translateY(9px); }
                      to   { opacity:1; transform:translateY(0);   } }

  #startBtn{
    position:relative;
    overflow:hidden;
    margin-top:6px;
    padding:17px 54px;
    font-size:16px; font-weight:600; letter-spacing:.6px;
    color:#fff;
    border:none;
    border-radius:40px;
    background:linear-gradient(100deg,#22b8c9 0%,#4a86ff 48%,#9a5cff 100%);
    box-shadow:0 12px 34px rgba(90,110,240,.5), inset 0 0 0 1px rgba(255,255,255,.10);
    animation:fadeUp 800ms ease both 800ms, btnGlow 3.6s ease-in-out infinite 1300ms;
    transition:transform 120ms ease, box-shadow 120ms ease;
  }
  #startBtn::after{
    content:"";
    position:absolute; top:0; left:-60%;
    width:45%; height:100%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.35), transparent);
    transform:skewX(-18deg);
    animation:sheen 4.6s ease-in-out infinite 1700ms;
  }
  #startBtn:active{
    transform:scale(.96);
    box-shadow:0 6px 22px rgba(90,110,240,.45);
  }
  @keyframes btnGlow{
    0%,100% { box-shadow:0 12px 30px rgba(90,110,240,.40), inset 0 0 0 1px rgba(255,255,255,.10); }
    50%     { box-shadow:0 14px 42px rgba(120,110,255,.62), inset 0 0 0 1px rgba(255,255,255,.14); }
  }
  @keyframes sheen{ 0%{ left:-60%; } 22%{ left:120%; } 100%{ left:120%; } }

  .splash-footer{
    position:absolute; left:0; right:0; bottom:28px;
    z-index:1;
    display:flex; justify-content:center; align-items:center;
    animation:fadeUp 900ms ease both 960ms;
  }
  .splash-footer .caption{
    color:#828aae; font-size:11.5px; letter-spacing:2.6px; text-transform:uppercase;
  }
  .sparkle{
    position:absolute; right:26px; bottom:24px;
    width:20px; height:20px; z-index:1;
    filter:drop-shadow(0 0 6px rgba(150,150,255,.6));
    animation:twinkle 3.4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100% { opacity:.5; transform:scale(.88) rotate(0deg); }
    50%     { opacity:1;  transform:scale(1.12) rotate(16deg); }
  }

  /* =========================================================
     HUD — TOP LAYER (above camera + overlay).
     Hidden until the demo is revealed.
     ========================================================= */
  #hud{
    position:fixed;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:35px;

    z-index:100;

    pointer-events:none;

    opacity:0;
    transition:opacity 500ms ease;
}
#hud.revealed{ opacity:1; }

#pinDots{
    display:flex;
    gap:18px;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #8aa9ff;
    transition:background 180ms ease, box-shadow 180ms ease,
               border-color 180ms ease, transform 180ms ease;
}
.dot.filled{
    background:linear-gradient(180deg,#6db8ff,#b06dff);
    border-color:#b9d0ff;
    box-shadow:0 0 12px rgba(109,184,255,.75),
               0 0 22px rgba(176,109,255,.45);
    transform:scale(1.14);
}

#rail{
    position:relative;

    /* wider rail + generous inner padding: digits get room to breathe */
    width:min(96vw,940px);
    height:98px;
    padding:0 10px;

    border-radius:49px;

    border:2px solid rgba(130,170,255,.7);

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(10px);

    display:flex;
    justify-content:space-between;
    align-items:center;

    box-shadow:
        0 0 20px rgba(90,160,255,.35);
}

/* Every rail cell (backspace + digits 0–9) gets an equal share of the
   rail width, so spacing stays even on any device. */
.item{
    flex:1 1 0;
    text-align:center;
    color:white;
    font-size:clamp(23px, 5.6vw, 36px);
    font-weight:500;
    line-height:1;
    z-index:2;

    transition:transform .12s ease, color .12s ease, text-shadow .12s ease;
}
.item.del{
    color:#a9bfe8;
    font-weight:600;
}

/* Highlighted cell under the selector */
.item.active{
    color:#fff;
    transform:scale(1.35);
    text-shadow:
        0 0 14px #6da8ff,
        0 0 26px #a66cff;
}

#selector{
    position:absolute;
    left:0;
    top:50%;

    /* width is set from JS to match one rail cell exactly */
    width:44px;
    height:64px;
    margin-top:-32px;

    border-radius:18px;

    background:linear-gradient(180deg,#6db8ff,#b06dff);

    box-shadow:
        0 0 14px rgba(109,184,255,.55),
        0 0 26px rgba(176,109,255,.35);

    z-index:1;

    /* GPU-accelerated magnetic snap */
    transform:translate3d(0,0,0);
    transition:transform 120ms cubic-bezier(0.34,1.2,0.64,1);
    will-change:transform;
}

  /* =========================================================
     PINCH AUTHENTICATION
     ========================================================= */

  /* Selector pulse on commit (glow only — position uses translate3d) */
  @keyframes selPulse{
    0%   { box-shadow:0 0 14px rgba(109,184,255,.55), 0 0 26px rgba(176,109,255,.35); filter:brightness(1); }
    45%  { box-shadow:0 0 28px rgba(160,210,255,.95), 0 0 54px rgba(200,150,255,.70); filter:brightness(1.35); }
    100% { box-shadow:0 0 14px rgba(109,184,255,.55), 0 0 26px rgba(176,109,255,.35); filter:brightness(1); }
  }
  #selector.pulse{ animation:selPulse 260ms cubic-bezier(0.39,0.575,0.565,1); }

  /* Commit spring-back: number releases from its pinched-down scale.
     easeOutSine timing — noticeable but never jarring. */
  @keyframes numCommit{
    0%   { transform:scale(1.02); text-shadow:0 0 26px #8fc6ff, 0 0 48px #c39bff; }
    45%  { transform:scale(1.56); text-shadow:0 0 22px #8fc6ff, 0 0 40px #c39bff; }
    100% { transform:scale(1.35); text-shadow:0 0 14px #6da8ff, 0 0 26px #a66cff; }
  }
  .item.commit{ animation:numCommit 260ms cubic-bezier(0.39,0.575,0.565,1); }

  /* HUD dims slightly behind the success card */
  #hud.revealed.dim{ opacity:.32; }

  /* Success card */
  #successCard{
    position:fixed;
    left:50%; top:50%;
    z-index:150;

    width:min(86vw,380px);
    padding:30px 26px 24px;

    text-align:center;

    border-radius:26px;
    border:1px solid rgba(130,170,255,.45);
    background:rgba(10,12,22,.72);
    backdrop-filter:blur(14px);
    box-shadow:0 18px 50px rgba(60,80,200,.45),
               inset 0 0 0 1px rgba(255,255,255,.06);

    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transform:translate(-50%,-50%) scale(.94);
    transition:opacity 220ms ease, transform 220ms ease, visibility 220ms;
  }
  #successCard.show{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
  }

  #successCard .check{
    width:58px; height:58px;
    margin:0 auto 16px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; color:#fff;
    background:linear-gradient(180deg,#6db8ff,#b06dff);
    box-shadow:0 0 18px rgba(109,184,255,.6),
               0 0 34px rgba(176,109,255,.4);
  }
  #successCard .title{
    color:#fff; font-size:19px; font-weight:600; letter-spacing:.2px;
  }
  #successCard .nfc{
    margin-top:12px;
    display:inline-flex; align-items:center; gap:8px;
    padding:7px 15px;
    border-radius:20px;
    border:1px solid rgba(130,170,255,.4);
    background:rgba(109,184,255,.10);
    color:#dbe6ff; font-size:13px; font-weight:600; letter-spacing:.4px;
  }
  #successCard .nfc .pip{
    width:8px; height:8px; border-radius:50%;
    background:#6db8ff;
    box-shadow:0 0 8px #6db8ff;
    animation:nfcPulse 1.6s ease-in-out infinite;
  }
  @keyframes nfcPulse{
    0%,100%{ opacity:.45; transform:scale(.85); }
    50%    { opacity:1;   transform:scale(1.15); }
  }
  #successCard .hint{
    margin-top:10px;
    color:#aab3d8; font-size:13.5px; font-weight:500; line-height:1.45;
  }
  #resetBtn{
    margin-top:22px;
    padding:13px 40px;
    font-size:15px; font-weight:600; letter-spacing:.5px;
    color:#fff;
    border:none;
    border-radius:34px;
    background:linear-gradient(100deg,#22b8c9 0%,#4a86ff 48%,#9a5cff 100%);
    box-shadow:0 10px 26px rgba(90,110,240,.45), inset 0 0 0 1px rgba(255,255,255,.10);
    transition:transform 150ms ease, box-shadow 150ms ease;
  }
  #resetBtn:active{
    transform:scale(.96);
    box-shadow:0 6px 18px rgba(90,110,240,.40);
  }
</style>
</head>

<script type="module">
  import {
    FilesetResolver,
    HandLandmarker
  } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs";

  // ---------- DOM ----------
  const video   = document.getElementById("camera");
  const canvas  = document.getElementById("overlay");
  const ctx     = canvas.getContext("2d");
  const debugBtn = document.getElementById("debugBtn");
  const statusEl = document.getElementById("status");
  const bootEl  = document.getElementById("boot");

  // Splash + HUD
  const splashEl = document.getElementById("splash");
  const startBtn = document.getElementById("startBtn");
  const hudEl    = document.getElementById("hud");

  // Rail DOM (index 0 = backspace, 1..10 = digits 0..9)
  const railEl     = document.getElementById("rail");
  const selectorEl = document.getElementById("selector");
  const itemEls    = Array.from(railEl.querySelectorAll(".item"));

  // PIN / success DOM
  const dotEls     = Array.from(document.querySelectorAll("#pinDots .dot"));
  const successEl  = document.getElementById("successCard");
  const resetBtn   = document.getElementById("resetBtn");

  // ---------- State ----------
  let handLandmarker = null;
  let debugOn = false;
  let lastVideoTime = -1;
  let latestResult = null;

  let fps = 0;
  let frameCount = 0;
  let fpsTimer = performance.now();

  const CONNECTIONS = HandLandmarker.HAND_CONNECTIONS;

  // ---------- Selector state ----------
  const WRIST = 0;

  // --- Snapping + deadzone tuning ---
  const SMOOTH_ALPHA   = 0.30;  // wrist smoothing (lower = steadier, laggier)
  const DEADZONE_RATIO = 0.62;  // must travel this fraction of a cell before switching
  const MIN_DWELL      = 110;   // ms, minimum time on a cell before it can change
  const NOISE_PX       = 1.5;   // ignore sub-pixel wrist jitter

  let selectorW    = 44;
  let currentIndex = -1;
  let smoothX      = null;      // smoothed wrist position inside the rail (px)
  let lastRawX     = null;
  let lastMoveAt   = 0;
  let cellSpacing  = 40;

  const geom = { displayedW: 0, offsetX: 0 };
  const itemCenters = [];

  // ---------- Pinch / PIN state ----------
  const THUMB_TIP = 4;
  const INDEX_TIP = 8;
  const PINCH_ON   = 0.055;    // close  -> PINCHED
  const PINCH_OFF  = 0.080;    // release -> OPEN (hysteresis)
  const PINCH_COOLDOWN = 300;  // ms debounce between accepted pinches
  const PIN_LENGTH = 4;

  let isPinched   = false;
  let pinchDist   = 0;
  let pinchT      = 0;         // 0..1 approach intensity (drives the shrink)
  let lastPinchAt = 0;
  let enteredPin  = [];
  let authDone    = false;
  let scaledEl    = null;      // element currently carrying an inline pinch scale

  function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }

  // ---------- Feedback: haptics + audio ----------
  let audioCtx = null;

  function initAudio() {
    if (audioCtx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    } catch (e) { audioCtx = null; }
  }

  // Short synthesized blip. Replaceable later with real audio files.
  function tone(freq, dur, gain, type, delay) {
    if (!audioCtx) return;
    if (audioCtx.state === "suspended") audioCtx.resume();
    const t0 = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function vibrate(pattern) {
    if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
  }

  // Digit change: light tick (low intensity)
  function feedbackMove() {
    vibrate(8);
    tone(1180, 0.045, 0.05, "sine");
  }
  // Pinch commit: stronger thump + two-tone confirm
  function feedbackCommit() {
    vibrate(32);
    tone(680, 0.075, 0.13, "triangle");
    tone(1020, 0.085, 0.10, "sine", 0.045);
  }
  // Delete: low descending blip
  function feedbackDelete() {
    vibrate([14, 40, 14]);
    tone(420, 0.075, 0.11, "triangle");
    tone(280, 0.090, 0.09, "sine", 0.05);
  }
  // Success: short rising arpeggio
  function feedbackSuccess() {
    vibrate([24, 60, 34]);
    tone(660, 0.11, 0.11, "sine", 0.00);
    tone(880, 0.11, 0.11, "sine", 0.09);
    tone(1320, 0.20, 0.12, "sine", 0.18);
  }

  // ---------- Geometry ----------
  function computeGeometry() {
    if (!video.videoWidth) return;

    const vw = window.innerWidth;
    const vh = window.innerHeight;

    const scale = Math.max(vw / video.videoWidth, vh / video.videoHeight);
    geom.displayedW = video.videoWidth * scale;
    geom.offsetX = (vw - geom.displayedW) / 2;

    itemCenters.length = 0;
    for (const el of itemEls) {
      itemCenters.push(el.offsetLeft + el.offsetWidth / 2);
    }

    // Average spacing between adjacent cells (used by the deadzone)
    if (itemCenters.length > 1) {
      cellSpacing =
        (itemCenters[itemCenters.length - 1] - itemCenters[0]) / (itemCenters.length - 1);
    }

    // Match the selector to one cell so it never overlaps neighbours
    const cellW = itemEls[0] ? itemEls[0].offsetWidth : 44;
    selectorW = clamp(Math.round(cellW - 6), 30, 62);
    selectorEl.style.width = selectorW + "px";
  }

  // ---------- Selector: deadzone + snap ----------
  function updateSelector(wrist) {
    const railBox = railEl.getBoundingClientRect();
    const screenX = geom.offsetX + wrist.x * geom.displayedW;
    const raw = screenX - (railBox.left + railEl.clientLeft);

    // Reject sub-pixel jitter outright
    if (lastRawX !== null && Math.abs(raw - lastRawX) < NOISE_PX) {
      // still let the smoother settle, but don't chase noise
    } else {
      lastRawX = raw;
    }

    if (smoothX === null) smoothX = raw;
    smoothX += (raw - smoothX) * SMOOTH_ALPHA;

    // Nearest cell to the smoothed position
    let best = 0, bestDist = Infinity;
    for (let i = 0; i < itemCenters.length; i++) {
      const d = Math.abs(itemCenters[i] - smoothX);
      if (d < bestDist) { bestDist = d; best = i; }
    }

    if (best === currentIndex) return;   // already locked on: nothing to do

    // Deadzone: the hand must clear a band around the current cell before
    // the selector will release and snap to the next one.
    const fromCurrent = currentIndex >= 0
      ? Math.abs(smoothX - itemCenters[currentIndex])
      : Infinity;

    const now = performance.now();
    const cleared = fromCurrent > cellSpacing * DEADZONE_RATIO;
    const dwelled = (now - lastMoveAt) > MIN_DWELL;

    if (currentIndex < 0 || (cleared && dwelled)) {
      lastMoveAt = now;
      moveToIndex(best);
    }
  }

  // Snap the selector to a cell (magnetic 120ms CSS transition, GPU)
  function moveToIndex(idx, silent) {
    if (idx === currentIndex) return;
    const prev = currentIndex;
    currentIndex = idx;

    const x = clamp(
      itemCenters[idx] - selectorW / 2,
      0,
      railEl.clientWidth - selectorW
    );
    selectorEl.style.transform = "translate3d(" + x + "px,0,0)";

    if (prev >= 0) {
      clearPinchScale();
      itemEls[prev].classList.remove("active");
    }
    itemEls[idx].classList.add("active");

    if (!silent) feedbackMove();   // haptic + tick on every digit change
  }

  function repositionSelector() {
    if (currentIndex < 0) return;
    const x = clamp(
      itemCenters[currentIndex] - selectorW / 2,
      0,
      railEl.clientWidth - selectorW
    );
    selectorEl.style.transform = "translate3d(" + x + "px,0,0)";
  }

  // ---------- Pinch detection ----------
  function pinchDistance(lm) {
    const a = lm[THUMB_TIP];
    const b = lm[INDEX_TIP];
    const aspect = (video.videoHeight || 720) / (video.videoWidth || 1280);
    const dx = a.x - b.x;
    const dy = (a.y - b.y) * aspect;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function clearPinchScale() {
    if (scaledEl) {
      scaledEl.style.transform = "";
      scaledEl.style.textShadow = "";
      scaledEl = null;
    }
  }

  // Continuous shrink as the fingers close, with an easeInSine response so the
  // motion stays gentle early and firms up right before the commit.
  function applyPinchScale(t) {
    const el = itemEls[currentIndex];
    if (!el) return;

    if (t <= 0.001) { clearPinchScale(); return; }

    const eased = 1 - Math.cos((t * Math.PI) / 2);   // easeInSine
    const scale = 1.35 - 0.33 * eased;               // 1.35 -> ~1.02
    const glowA = 14 + 14 * eased;
    const glowB = 26 + 24 * eased;

    el.style.transform  = "scale(" + scale.toFixed(3) + ")";
    el.style.textShadow = "0 0 " + glowA.toFixed(0) + "px #8fc6ff, 0 0 " +
                          glowB.toFixed(0) + "px #c39bff";
    scaledEl = el;
  }

  function handlePinch(lm) {
    pinchDist = pinchDistance(lm);

    // Approach intensity for the shrink animation
    pinchT = clamp((PINCH_OFF - pinchDist) / (PINCH_OFF - PINCH_ON), 0, 1);

    if (!isPinched) {
      applyPinchScale(pinchT);   // shrinking as fingers close

      if (pinchDist < PINCH_ON) {
        isPinched = true;
        const now = performance.now();
        if (now - lastPinchAt > PINCH_COOLDOWN) {
          lastPinchAt = now;
          commitSelection();
        }
      }
    } else {
      // Held closed: let the commit animation play, don't fight it
      if (pinchDist > PINCH_OFF) {
        isPinched = false;
      }
    }
  }

  // ---------- PIN entry ----------
  function commitSelection() {
    if (authDone) return;
    if (currentIndex < 0) return;

    const el = itemEls[currentIndex];
    const value = el.dataset.value;

    // Release the inline shrink so the keyframe spring-back reads cleanly
    clearPinchScale();

    // Selector pulse
    selectorEl.classList.remove("pulse");
    void selectorEl.offsetWidth;
    selectorEl.classList.add("pulse");

    // Number spring-back (easeOutSine)
    el.classList.remove("commit");
    void el.offsetWidth;
    el.classList.add("commit");

    if (value === "del") {
      if (enteredPin.length > 0) {
        enteredPin.pop();
        dotEls[enteredPin.length].classList.remove("filled");
        feedbackDelete();
      } else {
        feedbackDelete();
      }
      return;
    }

    if (enteredPin.length >= PIN_LENGTH) return;

    enteredPin.push(value);
    const dot = dotEls[enteredPin.length - 1];
    if (dot) dot.classList.add("filled");

    feedbackCommit();

    if (enteredPin.length === PIN_LENGTH) {
      authDone = true;
      setTimeout(showSuccess, 300);
    }
  }

  function showSuccess() {
    hudEl.classList.add("dim");
    successEl.classList.add("show");
    feedbackSuccess();
  }

  // ---------- Reset ----------
  function resetPin() {
    enteredPin = [];
    authDone = false;
    isPinched = false;
    pinchT = 0;
    lastPinchAt = 0;

    clearPinchScale();
    for (const d of dotEls) d.classList.remove("filled");

    selectorEl.classList.remove("pulse");
    for (const el of itemEls) el.classList.remove("commit");

    successEl.classList.remove("show");
    hudEl.classList.remove("dim");
  }

  resetBtn.addEventListener("click", resetPin);

  // ---------- Debug toggle ----------
  debugBtn.addEventListener("click", () => {
    debugOn = !debugOn;
    debugBtn.textContent = debugOn ? "DEBUG: ON" : "DEBUG: OFF";
    debugBtn.classList.toggle("off", !debugOn);
    statusEl.style.display = debugOn ? "block" : "none";
    if (!debugOn) ctx.clearRect(0, 0, canvas.width, canvas.height);
  });

  // ---------- Camera (rear) ----------
  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: false,
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    video.srcObject = stream;
    await new Promise((resolve) => {
      video.onloadedmetadata = () => { video.play(); resolve(); };
    });
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
  }

  // ---------- MediaPipe init (current official API) ----------
  async function initHandLandmarker() {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm"
    );
    handLandmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath:
          "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 1
    });
  }

  // ---------- Render loop ----------
  function loop() {
    if (handLandmarker && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
      lastVideoTime = video.currentTime;
      latestResult = handLandmarker.detectForVideo(video, performance.now());
    }

    frameCount++;
    const now = performance.now();
    if (now - fpsTimer >= 1000) {
      fps = frameCount;
      frameCount = 0;
      fpsTimer = now;
    }

    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    if (hands && hands.length > 0) {
      const lm = hands[0];
      updateSelector(lm[WRIST]);
      handlePinch(lm);
    } else {
      // Hand lost: hold the current cell, reset the pinch edge cleanly
      isPinched = false;
      pinchDist = 0;
      pinchT = 0;
      clearPinchScale();
    }

    draw();
    requestAnimationFrame(loop);
  }

  // ---------- Draw (debug overlay only) ----------
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const hands = latestResult && latestResult.landmarks ? latestResult.landmarks : null;
    const handPresent = hands && hands.length > 0;

    if (!debugOn || !handPresent) {
      if (debugOn) updateStatus(false);
      return;
    }

    const w = canvas.width;
    const h = canvas.height;
    const lm = hands[0];

    // Thin cyan glowing connection lines
    ctx.save();
    ctx.strokeStyle = "#00e5ff";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i = 0; i < CONNECTIONS.length; i++) {
      const a = lm[CONNECTIONS[i].start];
      const b = lm[CONNECTIONS[i].end];
      ctx.moveTo(a.x * w, a.y * h);
      ctx.lineTo(b.x * w, b.y * h);
    }
    ctx.stroke();
    ctx.restore();

    // Cyan glowing landmarks (21)
    ctx.save();
    ctx.fillStyle = "#00e5ff";
    ctx.shadowColor = "#00e5ff";
    ctx.shadowBlur = 12;
    for (let i = 0; i < lm.length; i++) {
      ctx.beginPath();
      ctx.arc(lm[i].x * w, lm[i].y * h, 5, 0, 6.283185307179586);
      ctx.fill();
    }
    ctx.restore();

    // Pinch line between thumb tip and index tip
    ctx.save();
    ctx.strokeStyle = isPinched ? "#b06dff" : "rgba(0,229,255,.55)";
    ctx.lineWidth = isPinched ? 4 : 2;
    ctx.setLineDash(isPinched ? [] : [6, 6]);
    ctx.shadowColor = isPinched ? "#b06dff" : "#00e5ff";
    ctx.shadowBlur = isPinched ? 14 : 6;
    ctx.beginPath();
    ctx.moveTo(lm[THUMB_TIP].x * w, lm[THUMB_TIP].y * h);
    ctx.lineTo(lm[INDEX_TIP].x * w, lm[INDEX_TIP].y * h);
    ctx.stroke();
    ctx.restore();

    // Landmark IDs (0–20)
    ctx.save();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 14px monospace";
    ctx.textBaseline = "middle";
    for (let i = 0; i < lm.length; i++) {
      ctx.fillText(String(i), lm[i].x * w + 8, lm[i].y * h);
    }
    ctx.restore();

    updateStatus(true);
  }

  // ---------- Debug readout ----------
  function updateStatus(detected) {
    const sel = currentIndex >= 0 ? itemEls[currentIndex].dataset.value : "-";
    statusEl.textContent =
      "STATUS: " + (detected ? "HAND DETECTED" : "NO HAND") + "\n" +
      "FPS: " + fps + "\n" +
      "HANDS: " + (detected ? 1 : 0) + "\n" +
      "SELECTED: " + sel + "\n" +
      "PINCH DIST: " + (detected ? pinchDist.toFixed(3) : "-") + "\n" +
      "PINCH T: " + pinchT.toFixed(2) + "\n" +
      "PINCH: " + (isPinched ? "PINCHED" : "OPEN") + "\n" +
      "PIN LEN: " + enteredPin.length + " / " + PIN_LENGTH;
  }

  // ---------- Resize ----------
  window.addEventListener("resize", () => { computeGeometry(); repositionSelector(); });
  window.addEventListener("orientationchange", () =>
    setTimeout(() => { computeGeometry(); repositionSelector(); }, 300));

  // ---------- Start Demo (splash -> camera -> MediaPipe -> reveal HUD) ----------
  startBtn.addEventListener("click", () => {
    initAudio();                 // unlock WebAudio inside the user gesture
    splashEl.style.opacity = "0";

    setTimeout(async () => {
      splashEl.style.display = "none";
      bootEl.style.display = "block";
      try {
        bootEl.textContent = "Starting camera…";
        await startCamera();

        bootEl.textContent = "Loading MediaPipe…";
        await initHandLandmarker();

        computeGeometry();
        moveToIndex(1, true);    // start on digit 0 (index 1), silent

        hudEl.classList.add("revealed");

        bootEl.style.display = "none";
        requestAnimationFrame(loop);
      } catch (err) {
        bootEl.textContent = "Error: " + (err && err.message ? err.message : err);
        console.error(err);
      }
    }, 500);
  });
</script>
</body>
</html>
