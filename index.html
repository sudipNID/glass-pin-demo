<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass PIN Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#020202;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

#hud{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:35px;
}

#pinDots{
    display:flex;
    gap:18px;
}

.dot{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #8aa9ff;
}

#rail{
    position:relative;
    width:min(92vw,900px);
    height:90px;

    border-radius:45px;

    border:2px solid rgba(130,170,255,.6);

    background:rgba(255,255,255,.04);

    box-shadow:
        0 0 18px rgba(92,150,255,.35),
        inset 0 0 30px rgba(255,255,255,.03);

    display:flex;
    justify-content:space-evenly;
    align-items:center;
}

.number{
    font-size:38px;
    color:#dfe7ff;
    z-index:2;
}

#selector{
    position:absolute;

    left:8px;

    width:74px;
    height:74px;

    border-radius:24px;

    background:
        radial-gradient(circle,#a86cff,#5aa8ff);

    opacity:.95;

    box-shadow:
        0 0 30px #8d5cff,
        0 0 60px #5aa8ff;

    z-index:1;
}
</style>

</head>

<body>

<div id="hud">

    <div id="pinDots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="rail">

        <div id="selector"></div>

        <div class="number">0</div>
        <div class="number">1</div>
        <div class="number">2</div>
        <div class="number">3</div>
        <div class="number">4</div>
        <div class="number">5</div>
        <div class="number">6</div>
        <div class="number">7</div>
        <div class="number">8</div>
        <div class="number">9</div>

    </div>

</div>

</body>
</html>
